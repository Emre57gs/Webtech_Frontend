name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Abhängigkeiten installieren
        working-directory: vue-frontend
        run: npm install
      - name: Frontend-Tests ausführen
        working-directory: vue-frontend
        run: npm run test:unit -- --run
